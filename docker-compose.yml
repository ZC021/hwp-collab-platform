services:
  hwp-collab:
    build: .
    container_name: hwp-collab
    restart: unless-stopped
    environment:
      PORT: "8170"
      HOST: "0.0.0.0"
      APP_ENV: "${HWP_COLLAB_APP_ENV:-pilot}"
      DATA_DIR: "/app/data"
      INTERNAL_NO_LOGIN: "true"
      RELAY_ONLY_MODE: "${HWP_COLLAB_RELAY_ONLY_MODE:-true}"
      PUBLIC_ORIGIN: "${HWP_COLLAB_PUBLIC_ORIGIN:-http://127.0.0.1:8170}"
      PUBLIC_BASE_URL: "${HWP_COLLAB_PUBLIC_BASE_URL:-}"
      PUBLIC_BASE_PATH: "${HWP_COLLAB_PUBLIC_BASE_PATH:-}"
      PUBLIC_ORIGINS: "${HWP_COLLAB_PUBLIC_ORIGINS:-http://127.0.0.1:8170}"
      API_RATE_LIMIT_PER_MIN: "${HWP_COLLAB_API_RATE_LIMIT_PER_MIN:-60000}"
      AUTH_RATE_LIMIT_PER_MIN: "${HWP_COLLAB_AUTH_RATE_LIMIT_PER_MIN:-2000}"
      WRITE_RATE_LIMIT_PER_MIN: "${HWP_COLLAB_WRITE_RATE_LIMIT_PER_MIN:-30000}"
      WS_MAX_CLIENTS: "${HWP_COLLAB_WS_MAX_CLIENTS:-250}"
      WS_MAX_ROOM_CLIENTS: "${HWP_COLLAB_WS_MAX_ROOM_CLIENTS:-150}"
      WS_MSG_RATE_PER_SEC: "${HWP_COLLAB_WS_MSG_RATE_PER_SEC:-100}"
      WS_PRESENCE_BROADCAST_MS: "${HWP_COLLAB_WS_PRESENCE_BROADCAST_MS:-100}"
      WS_DOC_BROADCAST_MS: "${HWP_COLLAB_WS_DOC_BROADCAST_MS:-1000}"
      WS_MAX_BUFFERED_BYTES: "${HWP_COLLAB_WS_MAX_BUFFERED_BYTES:-4194304}"
      RHWP_STUDIO_URL: "${HWP_COLLAB_ENGINE_URL:-}"
    ports:
      - "127.0.0.1:8170:8170"
    volumes:
      - "${HWP_COLLAB_DATA_DIR:-./data}:/app/data"
